multinode: false

# Distributed tracing configuration (OpenTelemetry)
# tracing:
#   enabled: true
#   otlpEndpoint: "http://otel-collector:4317"
#   sampling:
#     sampler: "parentbased_traceidratio"
#     samplerArg: "0.1"

modelArtifacts:
  uri: "hf://Qwen/Qwen3-0.6B" # TODO: fix model;size etc to be the same as vllm
  name: "Qwen/Qwen3-0.6B"
  size: 20Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "precise-prefix-cache-aware"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "Qwen3-0.6B"
    inference.networking.k8s.io/engine-type: sglang # TODO: explain why needed. validate is set. consider removal of gaie-kv-events/values_sglang.yaml

routing:
  proxy:
    enabled: false  # removes sidecar from deployment - no PD in inference scheduling

accelerator:  # controls specialized hardware Type
  type: nvidia

decode:
  create: true
#  priorityClassName: nightly-gpu-critical
  parallelism:
    tensor: 2
    data: 1
  replicas: 2
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "sglang"
      image: docker.io/lmsysorg/sglang:v0.5.6.post2 # TODO: align
      command: ["python3", "-m", "sglang.launch_server"]
      args:
        - "--model-path"
        - "Qwen/Qwen3-0.6B"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--dtype=bfloat16"
        - "--kv-cache-dtype=auto"
        - "--tp=2"
        - "--enable-metrics"
        - "--log-level" # TODO: remove
        - "debug"       # TODO: remove
        - "--page-size=64"
        - "--kv-events-config"
        - |-
          {
            "enable_kv_cache_events": true,
            "publisher": "zmq",
            "endpoint": "tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557",
            "topic": "kv@$(POD_IP):8000@Qwen/Qwen3-0.6B"
          }
        - "--mem-fraction-static=0.90"
        - "--trust-remote-code"
      env:
        - name: GAIE_RELEASE_NAME_POSTFIX  # index 0 matters because of set in helmfile
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace  # assumed to be the same as the EPP's
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: TRITON_CACHE_DIR
          value: /.triton-cache
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
  #        nvidia.com/gpu: '2' # added automatically from 'parallelism'
          cpu: '8'
          memory: 20Gi
        requests:
  #        nvidia.com/gpu: '2' # added automatically from 'parallelism'
          cpu: '8'
          memory: 20Gi
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: triton-cache
          mountPath: /.triton-cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: triton-cache
      emptyDir: {}

# PD disabled in this example
prefill:
  create: false
